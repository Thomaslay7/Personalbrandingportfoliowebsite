<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF2F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3E8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Header Section -->
  <rect x="0" y="0" width="1200" height="120" fill="white" opacity="0.95"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#E9D5FF" stroke-width="2"/>
  
  <!-- Logo/Branding -->
  <circle cx="80" cy="60" r="35" fill="url(#primaryGradient)"/>
  <text x="80" y="70" font-size="24" font-weight="bold" fill="white" text-anchor="middle">✨</text>
  
  <text x="140" y="75" font-size="28" font-weight="bold" fill="#1F2937">GlowUp</text>
  
  <!-- Navigation -->
  <text x="400" y="75" font-size="16" fill="#6B7280">Menu</text>
  <text x="700" y="75" font-size="14" fill="#9CA3AF">English</text>
  <text x="850" y="75" font-size="14" fill="#9CA3AF">Login</text>
  
  <!-- Buttons -->
  <rect x="1020" y="45" width="90" height="40" rx="20" fill="none" stroke="url(#primaryGradient)" stroke-width="2"/>
  <text x="1065" y="68" font-size="14" font-weight="600" fill="#EC4899" text-anchor="middle">Book Now</text>
  
  <rect x="1140" y="45" width="140" height="40" rx="20" fill="url(#primaryGradient)"/>
  <text x="1210" y="68" font-size="14" font-weight="600" fill="white" text-anchor="middle">Get Sourcecode</text>
  
  <!-- Main Content Area -->
  <!-- Left Section -->
  <text x="70" y="200" font-size="16" font-weight="600" fill="#EC4899">
    <tspan>✓ Complete Solution for Beauty Clinic</tspan>
  </text>
  
  <text x="70" y="280" font-size="56" font-weight="700" fill="#1F2937">
    <tspan x="70" dy="0">All-in-One Clinic</tspan>
    <tspan x="70" dy="70">Management System</tspan>
  </text>
  
  <text x="70" y="420" font-size="18" fill="#6B7280" font-weight="400">
    <tspan x="70" dy="0">Get booking website, management dashboard, mobile apps, and full</tspan>
    <tspan x="70" dy="30">support for your beauty clinic. Custom solution tailored to your</tspan>
    <tspan x="70" dy="30">business needs.</tspan>
  </text>
  
  <!-- Right Section - Features/Devices -->
  <g transform="translate(800, 200)">
    <!-- Phone 1 - iOS -->
    <rect x="0" y="0" width="160" height="320" rx="20" fill="white" stroke="#D1D5DB" stroke-width="2"/>
    <rect x="10" y="10" width="140" height="300" rx="15" fill="#F3E8FF"/>
    <circle cx="80" cy="20" r="8" fill="#1F2937"/>
    
    <!-- Phone content -->
    <text x="80" y="50" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle">Smartphone</text>
    <text x="80" y="65" font-size="10" fill="#6B7280" text-anchor="middle">iOS & Android</text>
    
    <!-- Mock phone UI elements -->
    <rect x="20" y="85" width="120" height="25" rx="5" fill="#EC4899" opacity="0.3"/>
    <rect x="20" y="120" width="120" height="25" rx="5" fill="#10B981" opacity="0.3"/>
    <rect x="20" y="155" width="120" height="25" rx="5" fill="#3B82F6" opacity="0.3"/>
    
    <!-- Mini chart bars -->
    <rect x="35" y="200" width="15" height="40" fill="#EC4899" opacity="0.7"/>
    <rect x="55" y="190" width="15" height="50" fill="#EC4899" opacity="0.7"/>
    <rect x="75" y="185" width="15" height="55" fill="#EC4899" opacity="0.7"/>
    <rect x="95" y="200" width="15" height="40" fill="#EC4899" opacity="0.7"/>
  </g>
  
  <!-- Phone 2 - Web Dashboard -->
  <g transform="translate(620, 200)">
    <rect x="0" y="0" width="140" height="280" rx="12" fill="white" stroke="#D1D5DB" stroke-width="2"/>
    <rect x="8" y="8" width="124" height="264" rx="8" fill="#F9FAFB"/>
    
    <!-- Mock dashboard -->
    <rect x="15" y="20" width="110" height="20" rx="4" fill="#EC4899" opacity="0.2"/>
    
    <line x1="15" y1="55" x2="125" y2="55" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="15" y="65" width="50" height="35" rx="4" fill="#EC4899" opacity="0.1"/>
    <rect x="75" y="65" width="50" height="35" rx="4" fill="#10B981" opacity="0.1"/>
    
    <line x1="15" y1="115" x2="125" y2="115" stroke="#E5E7EB" stroke-width="1"/>
    
    <!-- Dashboard bars -->
    <rect x="20" y="150" width="8" height="45" fill="#EC4899" opacity="0.6"/>
    <rect x="35" y="140" width="8" height="55" fill="#EC4899" opacity="0.6"/>
    <rect x="50" y="145" width="8" height="50" fill="#EC4899" opacity="0.6"/>
    <rect x="65" y="130" width="8" height="65" fill="#EC4899" opacity="0.6"/>
    <rect x="80" y="150" width="8" height="45" fill="#EC4899" opacity="0.6"/>
    <rect x="95" y="155" width="8" height="40" fill="#EC4899" opacity="0.6"/>
    
    <line x1="15" y1="220" x2="125" y2="220" stroke="#E5E7EB" stroke-width="1"/>
    <rect x="15" y="230" width="110" height="15" rx="3" fill="#E5E7EB"/>
  </g>
  
  <!-- Technology Stack Icons -->
  <g transform="translate(70, 550)">
    <text x="0" y="0" font-size="14" font-weight="600" fill="#1F2937">Technologies Used:</text>
    
    <!-- Laravel -->
    <circle cx="30" cy="60" r="22" fill="#FF2D20" opacity="0.1"/>
    <text x="30" y="68" font-size="11" font-weight="700" fill="#FF2D20" text-anchor="middle">Laravel</text>
    
    <!-- Filament -->
    <circle cx="100" cy="60" r="22" fill="#FBBF24" opacity="0.1"/>
    <text x="100" y="68" font-size="11" font-weight="700" fill="#FBBF24" text-anchor="middle">Filament</text>
    
    <!-- Flutter -->
    <circle cx="170" cy="60" r="22" fill="#02569B" opacity="0.1"/>
    <text x="170" y="68" font-size="11" font-weight="700" fill="#02569B" text-anchor="middle">Flutter</text>
    
    <!-- MySQL -->
    <circle cx="240" cy="60" r="22" fill="#00758F" opacity="0.1"/>
    <text x="240" y="68" font-size="11" font-weight="700" fill="#00758F" text-anchor="middle">MySQL</text>
  </g>
  
  <!-- Features List -->
  <g transform="translate(70, 680)">
    <text x="0" y="0" font-size="14" font-weight="600" fill="#1F2937">Key Features:</text>
    
    <circle cx="15" cy="35" r="3" fill="#EC4899"/>
    <text x="30" y="38" font-size="12" fill="#6B7280">Booking website with customer portal</text>
    
    <circle cx="250" cy="35" r="3" fill="#EC4899"/>
    <text x="265" y="38" font-size="12" fill="#6B7280">Filament admin dashboard</text>
    
    <circle cx="530" cy="35" r="3" fill="#EC4899"/>
    <text x="545" y="38" font-size="12" fill="#6B7280">iOS & Android mobile apps</text>
  </g>
</svg>
